<!DOCTYPE html>
<html>
<head>
<title>Position Demo</title>
<style>
body {
    margin: 0;
    background: #0d1117;
    height: 1500px;
    font-family: Arial;
    color: white;
}

/* 1. FIXED */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: #238636;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    z-index: 100;
}

/* 2. STICKY */
.banner {
    position: sticky;
    top: 60px;
    background: #ffd700;
    color: black;
    padding: 10px;
    text-align: center;
    margin-top: 70px;
    font-weight: bold;
}

/* 3. RELATIVE */
.card {
    position: relative;
    width: 300px;
    margin: 30px auto;
    background: #161b22;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    border: 2px solid #30363d;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 8px;
}

/* 4. ABSOLUTE */
.badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #da3633;
    color: white;
    padding: 5px 12px;
    border-radius: 15px;
    font-size: 14px;
}

/* 5. STATIC */
h5 {
    position: static;
    background: #161b22;
    color: #da3633;
    padding: 10px;
    width: 200px;
    font-size: 16px;
    margin: 20px auto;
    text-align: center;
    border: 1px solid #30363d;
}

.card h3 {
    margin: 10px 0 5px 0;
    color: #da3633;
    font-size: 0.8cm;
}

.card h4 {
    margin: 5px 0;
    color: #a371f7;
    font-size: 0.5cm;
}

.card p {
    margin: 0;
    font-size: 18px;
    color: #58a6ff;
}
</style>
</head>

<body>

<!-- 1. FIXED -->
<div class="navbar">JAMSHI SKINCARE - Fixed Navbar</div>

<!-- 2. STICKY -->
<div class="banner">20% OFF TODAY - Sticky Offer</div>

<!-- 3. RELATIVE + 4. ABSOLUTE -->
<div class="card">
    <div class="badge">Buy now</div>
    <img src="https://images.unsplash.com/photo-1556228720-195a672e8a03?w=400" alt="Body Lotion">
    <h3>Hydra Glow Lotion</h3>
    <p>$24.99</p>
    <h4>Deep moisturizing formula</h4>
</div>

<!-- 5. STATIC -->
<h5>Discount upto 20% (static)</h5>

</body>
</html>
