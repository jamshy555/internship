<!DOCTYPE html>
<html>
<head>
<title>Margin vs Padding Demo</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 0; background: #00b894; padding: 20px;">

<h1 style="text-align: center; color: #2d3436; margin-bottom: 30px;">Margin vs Padding - 3 Examples</h1>

<div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
    
    <div style="background: #c71585; padding: 40px; margin: 10px; border: 2px solid #2d3436; width: 250px;">
        <h2 style="color: white; margin: 0 0 10px 0; text-align: center;">Example 1</h2>
        <p style="color: white; margin: 0 0 5px 0; text-align: center;">Padding: 40px</p>
        <p style="color: white; margin: 0 0 15px 0; text-align: center;">Margin: 10px</p>
        <div style="background: #2d3436; color: #f1c40f; padding: 10px; text-align: center; font-weight: bold;">More space INSIDE</div>
    </div>

    <div style="background: #2d3436; padding: 10px; margin: 40px; border: 2px solid #c71585; width: 250px;">
        <h2 style="color: white; margin: 0 0 10px 0; text-align: center;">Example 2</h2>
        <p style="color: white; margin: 0 0 5px 0; text-align: center;">Padding: 10px</p>
        <p style="color: white; margin: 0 0 15px 0; text-align: center;">Margin: 40px</p>
        <div style="background: #c71585; color: white; padding: 10px; text-align: center; font-weight: bold;">More space OUTSIDE</div>
    </div>

    <div style="background: white; padding: 20px; margin: 20px; border: 2px solid #c71585; width: 250px;">
        <h2 style="color: #2d3436; margin: 0 0 10px 0; text-align: center;">Example 3</h2>
        <p style="color: #2d3436; margin: 0 0 5px 0; text-align: center;">Padding: 20px</p>
        <p style="color: #2d3436; margin: 0 0 15px 0; text-align: center;">Margin: 20px</p>
        <div style="background: #00b894; color: #2d3436; padding: 10px; text-align: center; font-weight: bold;">Balanced spacing</div>
    </div>

</div>

</body>
</html>
