<!DOCTYPE html>
<html>
<head>
<title>Flex Properties Demo</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background: #f5f5f5;
    }
    h1 { text-align: center; color: #2c3e50; }
    
    .container {
        display: flex;              /* 1. Enable flex */
        justify-content: space-around; /* 2. Horizontal spacing */
        align-items: center;        /* 3. Vertical alignment */
        gap: 20px;                  /* 4. Space between items */
        flex-wrap: wrap;            /* 5. Wrap to next line */
        background: #bdc3c7;
        padding: 20px;
        min-height: 200px;
        border: 2px solid #7f8c8d;
    }
    
    .item {
        background: #3498db;
        color: white;
        padding: 40px;
        text-align: center;
        border-radius: 8px;
        flex: 1;                    /* 6. Grow to fill space */
        min-width: 150px;
    }
    
    .item2 {
        flex: 2;                    /* 7. This one grows 2x */
        background: #e74c3c;
    }
    
    .item3 {
        align-self: flex-end;       /* 8. Override align-items */
        background: #2ecc71;
    }
</style>
</head>
<body>
<h1>Flex Properties</h1>
<div class="container">
    <div class="item">Item 1<br>flex: 1</div>
    <div class="item item2">Item 2<br>flex: 2</div>
    <div class="item item3">Item 3<br>align-self: flex-end</div>
    <div class="item">Item 4<br>gap: 20px</div>
</div>
<p><b>Used:</b> display:flex, justify-content, align-items, gap, flex-wrap, flex, align-self</p>
</body>
</html>
