<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Manipulation Mini Project</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            max-width: 600px; 
            margin: auto;
        }
        section { 
            border: 1px solid #ccc; 
            padding: 15px; 
            margin-bottom: 20px; 
            border-radius: 8px;
        }
        input { 
            padding: 8px; 
            margin-right: 5px; 
        }
        button { 
            padding: 8px 12px; 
            cursor: pointer; 
        }
        ul { 
            margin-top: 10px; 
        }
        li { 
            margin: 5px 0; 
        }
        .deleteBtn { 
            margin-left: 10px; 
            background: red; 
            color: white; 
            border: none; 
            padding: 4px 8px;
        }
    </style>
</head>
<body>
    <h1>DOM Manipulation Mini Project</h1>

    <!-- 1. Dynamic List -->
    <section>
        <h3>Dynamic List</h3>
        <input type="text" id="itemInput" placeholder="Enter item">
        <button id="addBtn">Add</button>
        <ul id="itemList"></ul>
    </section>

    <!-- 2. To-Do List -->
    <section>
        <h3>To-Do List</h3>
        <input type="text" id="taskInput" placeholder="Enter task">
        <button id="addTaskBtn">Add Task</button>
        <ul id="taskList"></ul>
    </section>

    <!-- 3. Toggle Button -->
    <section>
        <h3>Toggle Button</h3>
        <p id="helloText">Hello Jamshi</p>
        <button id="toggleBtn">Hide</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
