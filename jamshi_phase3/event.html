<!DOCTYPE html>
<html>
<head>
<title>Event Handling</title>
</head>
<body>

<h3>Event Handling</h3>
<h4>Name: Jamshi</h4>

<!-- Task 1 -->
<p id="text">Click the button to change me</p>
<button id="btn">Click Me</button>

<br><br>

<!-- Task 2 -->
<input type="text" id="inputBox" placeholder="Type here">
<p>Live Preview: <span id="live"></span></p>

<br>

<!-- Task 3 -->
<form id="myForm">
  <input type="text" id="name" placeholder="Enter name">
  <button type="submit">Submit</button>
</form>

<p id="error"></p>

<script>
// Task 1: Button click
document.getElementById("btn").addEventListener("click", function() {
  document.getElementById("text").innerText = "Button Clicked!";
});

// Task 2: Live preview
document.getElementById("inputBox").addEventListener("input", function() {
  document.getElementById("live").innerText = this.value;
});

// Task 3: Form validation
document.getElementById("myForm").addEventListener("submit", function(e) {
  e.preventDefault();

  let name = document.getElementById("name").value;
  let msg = document.getElementById("error");

  if(name === "") {
    msg.innerText = "Please enter your name!";
    msg.style.color = "red";
  } else {
    msg.innerText = "Form Submitted: " + name;
    msg.style.color = "green";
  }
});
</script>

</body>
</html>
